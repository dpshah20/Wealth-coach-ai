<!-- Chat Component -->
<div id="chat-container" class="chat-section">
  <div class="chat-header">
    <h3 class="text-lg font-semibold gradient-text">💬 Chat with ARIA</h3>
    <p class="text-sm text-muted">Your personal wealth coach</p>
  </div>

  <div id="chat-messages" class="chat-messages">
    <!-- Messages will be loaded here -->
  </div>

  <div id="typing-indicator" class="typing-indicator" style="display: none;">
    <span></span><span></span><span></span>
  </div>

  <div class="chat-input-container">
    <div class="quick-questions">
      <button class="quick-btn" onclick="sendQuickMessage('What is SIP?')">What is SIP?</button>
      <button class="quick-btn" onclick="sendQuickMessage('Mutual fund vs FD?')">Mutual fund vs FD?</button>
      <button class="quick-btn" onclick="sendQuickMessage('What is compounding?')">What is compounding?</button>
      <button class="quick-btn" onclick="sendQuickMessage('Emergency fund?')">Emergency fund?</button>
    </div>

    <div class="chat-input-group">
      <input
        type="text"
        id="chat-input"
        placeholder="Ask ARIA anything about investing..."
        class="chat-input"
        onkeypress="handleChatKeyPress(event)"
      />
      <button onclick="sendChatMessage()" class="chat-send-btn">Send</button>
    </div>
  </div>
</div>

<style>
.chat-section {
  display: flex;
  flex-direction: column;
  height: 100%;
  background: var(--card-bg);
  border-radius: 1rem;
  padding: 1.5rem;
}

.chat-header {
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid rgba(0, 201, 177, 0.1);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0;
  max-height: 400px;
}

.chat-input-container {
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid rgba(0, 201, 177, 0.1);
}

.quick-questions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.quick-btn {
  background: rgba(0, 201, 177, 0.1);
  color: var(--teal);
  border: 1px solid rgba(0, 201, 177, 0.3);
  padding: 0.5rem 1rem;
  border-radius: 0.5rem;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.3s ease;
}

.quick-btn:hover {
  background: rgba(0, 201, 177, 0.2);
  transform: translateY(-1px);
}

.chat-input-group {
  display: flex;
  gap: 0.5rem;
}

.chat-input {
  flex: 1;
  background: rgba(10, 22, 40, 0.6);
  border: 1px solid #1e3a5f;
  color: var(--text);
  padding: 0.75rem 1rem;
  border-radius: 0.5rem;
  font-size: 0.95rem;
}

.chat-input:focus {
  outline: none;
  border-color: var(--teal);
  background: rgba(10, 22, 40, 0.8);
}

.chat-send-btn {
  background: linear-gradient(135deg, var(--teal), #00A894);
  color: var(--navy);
  border: none;
  padding: 0.75rem 1.5rem;
  border-radius: 0.5rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
}

.chat-send-btn:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 8px 16px rgba(0, 201, 177, 0.3);
}

.chat-send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
</style>
