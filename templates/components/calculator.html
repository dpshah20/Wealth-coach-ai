<!-- SIP Calculator Component -->
<div id="calculator-container" class="calculator-section">
  <div class="calculator-header">
    <h3 class="text-lg font-semibold gradient-text">📈 SIP Calculator</h3>
    <p class="text-sm text-muted">See how your investments grow over time</p>
  </div>

  <div class="calculator-controls">
    <div class="control-group">
      <label class="control-label">Monthly Investment</label>
      <div class="slider-container">
        <input
          type="range"
          id="monthly-amount"
          min="500"
          max="50000"
          step="500"
          value="5000"
          class="calculator-slider"
        />
        <span class="slider-value" id="monthly-value">₹5,000</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">Annual Return (%)</label>
      <div class="slider-container">
        <input
          type="range"
          id="annual-return"
          min="4"
          max="20"
          step="0.5"
          value="12"
          class="calculator-slider"
        />
        <span class="slider-value" id="return-value">12%</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">Investment Period (Years)</label>
      <div class="slider-container">
        <input
          type="range"
          id="investment-years"
          min="1"
          max="30"
          step="1"
          value="10"
          class="calculator-slider"
        />
        <span class="slider-value" id="years-value">10 years</span>
      </div>
    </div>
  </div>

  <div class="calculator-results">
    <div class="result-cards">
      <div class="result-card">
        <div class="result-label">Total Invested</div>
        <div class="result-value" id="total-invested">₹6,00,000</div>
      </div>
      <div class="result-card">
        <div class="result-label">Portfolio Value</div>
        <div class="result-value" id="portfolio-value">₹11,23,456</div>
      </div>
      <div class="result-card">
        <div class="result-label">Compounding Gain</div>
        <div class="result-value" id="compounding-gain">₹5,23,456</div>
      </div>
    </div>

    <div class="chart-container">
      <canvas id="sip-chart" width="400" height="200"></canvas>
    </div>

    <div class="table-container">
      <table class="results-table">
        <thead>
          <tr>
            <th>Year</th>
            <th>Invested</th>
            <th>Portfolio Value</th>
            <th>Gain</th>
          </tr>
        </thead>
        <tbody id="results-table-body">
          <!-- Table rows will be populated by JavaScript -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<style>
.calculator-section {
  background: var(--card-bg);
  border-radius: 1rem;
  padding: 1.5rem;
}

.calculator-header {
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid rgba(0, 201, 177, 0.1);
}

.calculator-controls {
  margin-bottom: 2rem;
}

.control-group {
  margin-bottom: 1.5rem;
}

.control-label {
  display: block;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 0.75rem;
  font-size: 0.9rem;
}

.slider-container {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.calculator-slider {
  flex: 1;
  height: 6px;
  border-radius: 5px;
  background: linear-gradient(to right, var(--navy), #1e3a5f);
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}

.calculator-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--teal), var(--gold));
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0, 201, 177, 0.4);
  transition: all 0.2s ease;
}

.calculator-slider::-webkit-slider-thumb:hover {
  width: 22px;
  height: 22px;
  box-shadow: 0 4px 12px rgba(0, 201, 177, 0.6);
}

.slider-value {
  font-weight: 700;
  color: var(--teal);
  font-variant-numeric: tabular-nums;
  min-width: 80px;
  text-align: right;
}

.calculator-results {
  margin-top: 2rem;
}

.result-cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 1rem;
  margin-bottom: 2rem;
}

.result-card {
  background: rgba(0, 201, 177, 0.05);
  border: 1px solid rgba(0, 201, 177, 0.2);
  border-radius: 0.75rem;
  padding: 1rem;
  text-align: center;
}

.result-label {
  font-size: 0.85rem;
  color: var(--muted);
  margin-bottom: 0.5rem;
}

.result-value {
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--teal);
}

.chart-container {
  margin-bottom: 2rem;
  padding: 1rem;
  background: rgba(10, 22, 40, 0.3);
  border-radius: 0.75rem;
}

.table-container {
  overflow-x: auto;
}

.results-table {
  width: 100%;
  border-collapse: collapse;
  background: rgba(10, 22, 40, 0.3);
  border-radius: 0.5rem;
  overflow: hidden;
}

.results-table th,
.results-table td {
  padding: 0.75rem;
  text-align: left;
  border-bottom: 1px solid rgba(0, 201, 177, 0.1);
}

.results-table th {
  background: rgba(0, 201, 177, 0.1);
  font-weight: 600;
  color: var(--text);
}

.results-table td {
  color: var(--muted);
}

.results-table tbody tr:hover {
  background: rgba(0, 201, 177, 0.05);
}
</style>
